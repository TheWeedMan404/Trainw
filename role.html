<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainw — Accès</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="TW Role.css?v=20260330-2">
  <link rel="stylesheet" href="trainw-enhancements.css?v=20260330-2">
</head>
<body>

  <div class="noise"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Topbar -->
  <div class="topbar">
    <a href="index.html" class="back-btn">← <span data-i18n="backBtn">Back to Home</span></a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn active" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="ar">ع</button>
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="logo-text">TRAINW</div>

    <h1 class="card-title" data-i18n="cardTitle">Bienvenue</h1>
    <p class="card-sub" data-i18n="cardSub">Choose your account type to continue</p>

    <div class="role-label" data-i18n="roleLabel">Select Your Role</div>

    <div class="role-grid">
      <a href="login.html?role=gym_owner" class="role-card">
        <div class="role-icon">🏢</div>
        <div class="role-body">
          <div class="role-title" data-i18n="gymTitle">Gym Owner</div>
          <div class="role-desc" data-i18n="gymDesc">Manage your gym, coaches, and revenue</div>
        </div>
        <div class="role-arrow">→</div>
      </a>

      <a href="login.html?role=coach" class="role-card">
        <div class="role-icon">💪</div>
        <div class="role-body">
          <div class="role-title" data-i18n="coachTitle">Coach</div>
          <div class="role-desc" data-i18n="coachDesc">Track clients, sessions, and earnings</div>
        </div>
        <div class="role-arrow">→</div>
      </a>

      <a href="login.html?role=client" class="role-card">
        <div class="role-icon">🎯</div>
        <div class="role-body">
          <div class="role-title" data-i18n="clientTitle">Client</div>
          <div class="role-desc" data-i18n="clientDesc">Book sessions and track your progress</div>
        </div>
        <div class="role-arrow">→</div>
      </a>
    </div>

    <p class="footer-txt">
      <span data-i18n="newHere">New to Trainw?</span>
      <a href="index.html" data-i18n="learnMore">Learn more</a>
    </p>
  </div>

  <script src="TW Role.js?v=20260330-2"></script>
</body>
</html>
