<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainw — Connexion</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="TW Login.css">
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Topbar -->
  <div class="topbar">
    <a href="TW Role.html" class="back-btn">← <span data-i18n="navBack">Back</span></a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn active" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="ar">ع</button>
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="logo-text">TRAINW</div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-login"  data-tab="login"  data-i18n="tabLogin">Sign In</button>
      <button class="tab"        id="tab-signup" data-tab="signup" data-i18n="tabSignup">Create Account</button>
    </div>

    <!-- Role badge -->
    <div class="rbadge" id="rbadge"></div>

    <!-- ── LOGIN PANEL ── -->
    <div class="panel active" id="panel-login">
      <p class="ptitle" data-i18n="loginTitle">WELCOME BACK</p>
      <p class="psub"   data-i18n="loginSub">Sign in to your Trainw dashboard</p>

      <div class="field">
        <label data-i18n="lEmail">Email</label>
        <input id="l-email" class="input" type="email" placeholder="you@example.com">
        <div class="ferr" id="l-email-e"></div>
      </div>

      <div class="field">
        <label data-i18n="lPw">Password</label>
        <div class="pw-wrap">
          <input id="l-pw" class="input" type="password" placeholder="••••••••">
          <button class="eye" type="button" data-target="l-pw">👁</button>
        </div>
        <div class="ferr" id="l-pw-e"></div>
      </div>

      <div class="forgot"><a id="forgot-link" data-i18n="forgotPw">Forgot password?</a></div>

      <button class="btn" id="btn-login">
        <span data-i18n="btnLogin">Sign In</span><span class="spin"></span>
      </button>
      <div class="alert aerr" id="l-err"></div>
      <div class="alert aok"  id="l-ok"></div>
    </div>

    <!-- ── SIGNUP PANEL ── -->
    <div class="panel" id="panel-signup">
      <p class="ptitle" data-i18n="signupTitle">JOIN TRAINW</p>
      <p class="psub"   data-i18n="signupSub">Create your account in seconds</p>

      <div class="field">
        <label data-i18n="lName">Full Name</label>
        <input id="s-name" class="input" type="text" placeholder="Ahmed Ben Ali">
        <div class="ferr" id="s-name-e"></div>
      </div>

      <div class="field">
        <label data-i18n="lEmail">Email</label>
        <input id="s-email" class="input" type="email" placeholder="you@example.com">
        <div class="ferr" id="s-email-e"></div>
      </div>

      <div class="field">
        <label data-i18n="lPw">Password</label>
        <div class="pw-wrap">
          <input id="s-pw" class="input" type="password" placeholder="Min. 8 characters">
          <button class="eye" type="button" data-target="s-pw">👁</button>
        </div>
        <div class="ferr" id="s-pw-e"></div>
      </div>

      <div class="field">
        <label data-i18n="lConfirm">Confirm Password</label>
        <div class="pw-wrap">
          <input id="s-pw2" class="input" type="password" placeholder="Repeat password">
          <button class="eye" type="button" data-target="s-pw2">👁</button>
        </div>
        <div class="ferr" id="s-pw2-e"></div>
      </div>

      <div class="field">
        <label data-i18n="lRole">I am a</label>
        <select id="s-role" class="input">
          <option value="client">Client</option>
          <option value="coach">Coach</option>
          <option value="gym_owner">Gym Owner</option>
        </select>
      </div>

      <!-- Gym name — shown only for gym_owner -->
      <div class="gym-name-wrap" id="gym-name-wrap">
        <div class="field" style="margin-bottom:0;">
          <label data-i18n="lGymName">Gym Name</label>
          <input id="s-gym-name" class="input" type="text" placeholder="e.g. Gymway Ariana">
          <div class="ferr" id="s-gym-name-e"></div>
        </div>
      </div>

      <button class="btn" id="btn-signup">
        <span data-i18n="btnSignup">Create Account</span><span class="spin"></span>
      </button>
      <div class="alert aerr" id="s-err"></div>
      <div class="alert aok"  id="s-ok"></div>
    </div>
  </div>

  <script src="TW Login.js"></script>
</body>
</html>
